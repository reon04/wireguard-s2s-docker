name: Publish Release and Build Docker
on:
  workflow_run:
    workflows: [Merge Dependabot Pullrequest]
    types:
      - completed
  push:
    branches:
      - main
jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract base image version
        id: extract_version
        run: |
          BASE_IMAGE_VERSION=$(grep -i '^FROM ' Dockerfile | head -1 | cut -d ':' -f2- | cut -d '-' -f1)
          echo "version=$BASE_IMAGE_VERSION" >> $GITHUB_OUTPUT
      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create GitHub Release
        run: |
          TAG_NAME=${{ steps.extract_version.outputs.version }}
          if git show-ref --tags --verify --quiet "refs/tags/${TAG_NAME}"; then
            git tag -d "$TAG_NAME"
            git push origin -d "$TAG_NAME"
            gh release delete "$TAG_NAME"
          fi
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          gh release create "$TAG_NAME" --title "$TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max